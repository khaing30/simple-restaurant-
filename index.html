<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Restaurant Pro App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🍽️ <span style="font-size*60px; font-weight:900; font-style:italic; color:gold; letter-spacing:4px;">TGA</span>Restaurant</h1>
</header>

<!-- 🔍 Search -->
<input type="text" id="search" placeholder="Search..." onkeyup="filterMenu()">

<!-- 📂 Category -->
<div class="filters">
  <button onclick="filterCategory('all')">All</button>
  <button onclick="filterCategory('food')">Food</button>
  <button onclick="filterCategory('drink')">Drink</button>
</div>

<!-- 🍽️ Menu -->
<div class="menu" id="menu"></div>

<hr>

<!-- 🛒 Cart -->
<h2>🛒 Cart</h2>
<ul id="cartList"></ul>
<h3>Total: ¥<span id="total">0</span></h3>
<button onclick="checkout()">Order</button>

<hr>

<!-- 📜 History -->
<h2>📜 Order History</h2>
<ul id="historyList"></ul>

<script src="script.js"></script>
</body>
</html>
